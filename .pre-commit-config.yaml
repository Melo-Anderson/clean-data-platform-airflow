# .pre-commit-config.yaml
# Hooks que rodam localmente antes de cada commit.
# Instalar com: uv run pre-commit install
# Rodar manualmente: uv run pre-commit run --all-files
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: .venv/Scripts/ruff.exe check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff-format
        entry: .venv/Scripts/ruff.exe format
        language: system
        types: [python]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/Scripts/mypy.exe
        language: system
        args: [app/]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # Impede commits acidentais com trailing whitespace
      - id: trailing-whitespace
      # Garante newline no final de cada arquivo
      - id: end-of-file-fixer
      # Valida YAMLs (DAG configs, pyproject, etc.)
      - id: check-yaml
      # Impede commit de arquivos gigantes acidentais
      - id: check-added-large-files
        args: ['--maxkb=500']
