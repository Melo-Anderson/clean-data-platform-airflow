name: Data Platform CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci_gate:
    name: Code Quality & Static Check Gate
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Install Dependencies
      run: uv sync --all-extras

    - name: Check code formatting (Ruff)
      run: uv run ruff format --check .

    - name: Run Linter (Ruff)
      run: uv run ruff check .

    - name: Run Type Checking (Mypy)
      run: uv run mypy app/

    - name: Run Static YAML Validation Gate
      run: uv run pytest tests/unit/infrastructure/test_ci_validator.py -v

    - name: Run Unit Tests with Coverage
      env:
        HYPOTHESIS_PROFILE: ci
      run: uv run pytest -m "not e2e" -v --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80

  test_migrations:
    name: Test Alembic Migrations
    needs: ci_gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: airflow
          POSTGRES_PASSWORD: airflow
          POSTGRES_DB: platform_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --all-extras

      - name: Run forward migration (upgrade head)
        env:
          PLATFORM_DATABASE_URL: "postgresql+asyncpg://airflow:airflow@localhost:5432/platform_db"
          PLATFORM_SECRET_KEY: "dummy-secret-key-for-test-purposes"
        run: uv run alembic upgrade head

      - name: Validate rollback (downgrade -1)
        env:
          PLATFORM_DATABASE_URL: "postgresql+asyncpg://airflow:airflow@localhost:5432/platform_db"
          PLATFORM_SECRET_KEY: "dummy-secret-key-for-test-purposes"
        run: uv run alembic downgrade -1

      - name: Re-apply migration (upgrade head again)
        env:
          PLATFORM_DATABASE_URL: "postgresql+asyncpg://airflow:airflow@localhost:5432/platform_db"
          PLATFORM_SECRET_KEY: "dummy-secret-key-for-test-purposes"
        run: uv run alembic upgrade head

  build_image:
    name: Build Docker API Image
    needs: ci_gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t data-platform:latest -f Dockerfile.api .

  cd_deploy:
    name: Deploy to Airflow
    needs: ci_gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Validate DAGs (Dry Run)
      run: |
        uv sync --all-extras
        # Generates DAGs in dry-run mode for validation and diff
        uv run python -m cli.main pipeline rebuild --template-version 2.0 --dry-run
        # Run DAG generator tests
        uv run pytest tests/unit/infrastructure/test_dag_generator.py -v

    - name: Generate production DAGs
      run: |
        # Executes the static rebuild generating the final .py DAG files
        uv run python -m cli.main pipeline rebuild --template-version 2.0

    - name: Upload DAG Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: compiled-dags
        path: output_dags/

    - name: Deploy to Airflow Storage
      # DEV/SHOWCASE ONLY: Este step e um mock educacional.
      # Em producao, substitua o echo abaixo pelo comando do seu cloud provider.
      # Ver docs/ci_cd_guide.md secao "Sincronizacao com Cloud Provider".
      run: |
        # In a production environment, you would sync the compiled-dags artifact to your Airflow environment.
        # Examples of how to do this:
        #
        # GCP Cloud Composer (GCS Bucket):
        #   gsutil -m rsync -r -d output_dags/ gs://<your-composer-bucket>/dags/
        #
        # AWS MWAA (S3 Bucket):
        #   aws s3 sync output_dags/ s3://<your-mwaa-bucket>/dags/
        #
        # Local/Self-hosted Airflow (Volume Mount):
        #   cp -r output_dags/* /path/to/airflow/dags/
        #
        echo "Artifact compiled-dags is ready. Mock deploy completed successfully."
