x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.0.0-python3.12}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'True'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      # We override the entrypoint to create two databases: airflow and platform_db
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./scripts/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-webserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    entrypoint:
      - bash
      - -c
      - |
        airflow db migrate
    depends_on:
      postgres:
        condition: service_healthy

  platform-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - PLATFORM_DATABASE_URL=postgresql+asyncpg://airflow:airflow@postgres:5432/platform_db
      - PLATFORM_SECRET_KEY=test_secret_key
      - PLATFORM_SECRET_MANAGER_ADAPTER=openbao
      - PLATFORM_VAULT_URL=http://openbao:8200
      - PLATFORM_VAULT_TOKEN=root
    volumes:
      - ./app:/app/app
      - ./cli:/app/cli
      - ./dags:/app/dags
    depends_on:
      postgres:
        condition: service_healthy

  openbao:
    image: openbao/openbao:latest
    ports:
      - "8200:8200"
    environment:
      - BAO_DEV_ROOT_TOKEN_ID=root
      - BAO_DEV_LISTEN_ADDRESS=0.0.0.0:8200

  openbao-init:
    image: curlimages/curl:latest
    depends_on:
      - openbao
    entrypoint: >
      sh -c "
      until curl -s http://openbao:8200/v1/sys/health | grep -q '\"initialized\":true'; do
        echo 'Waiting for OpenBao...';
        sleep 1;
      done;
      curl --header 'X-Vault-Token: root' \
           --request POST \
           --data '{\"data\": {\"username\": \"airflow\", \"password\": \"airflow\", \"host\": \"postgres\", \"port\": \"5432\", \"database\": \"platform_db\"}}' \
           http://openbao:8200/v1/secret/data/postgres
      "

volumes:
  postgres-db-volume:
