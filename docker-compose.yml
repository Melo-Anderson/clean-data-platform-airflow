x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.0.0-python3.12}
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'True'
    AIRFLOW__CORE__STORE_SERIALIZED_DAGS: 'False'
    AIRFLOW__CORE__MIN_SERIALIZED_DAG_UPDATE_INTERVAL: '0'
    PYTHONPATH: /opt/airflow
    AIRFLOW__DAG_PROCESSOR__REFRESH_INTERVAL: '1'
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: '1'
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: '1'
    AIRFLOW__API__WORKER_TIMEOUT: '120'
    AIRFLOW__API__WORKERS: '4'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./app:/opt/airflow/app
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    profiles:
      - core
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      # We override the entrypoint to create two databases: airflow and platform_db
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./scripts/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-webserver:
    <<: *airflow-common
    profiles:
      - airflow
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    profiles:
      - airflow
    command: scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    profiles:
      - airflow
    command: dag-processor
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    profiles:
      - airflow
    command: triggerer
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    profiles:
      - airflow
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    entrypoint:
      - bash
      - -c
      - |
        airflow db migrate
    depends_on:
      postgres:
        condition: service_healthy

  platform-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    profiles:
      - api
    ports:
      - "8000:8000"
    environment:
      PLATFORM_DATABASE_URL: postgresql+asyncpg://airflow:airflow@postgres:5432/platform_db
      PLATFORM_SECRET_KEY: test_secret_key
      PLATFORM_SECRET_MANAGER_ADAPTER: openbao
      PLATFORM_VAULT_URL: http://openbao:8200
      PLATFORM_VAULT_TOKEN: root
      PLATFORM_AIRFLOW_URL: http://airflow-webserver:8080
      PLATFORM_AIRFLOW_USERNAME: admin
      PLATFORM_AIRFLOW_PASSWORD: admin
      PLATFORM_AUTH_JWT_PUBLIC_KEY_PEM: |
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAqdez7Ek393tN5sEe+hgo
        Jt86QEmGm9V5BiYq7LfzWb0GfPANbtkE4kHloTu0wy14p5KNp9GRcTWUl9v8EHAT
        Cgp8Fsav8RROm+98x0JKHbo/mEI9n/vMb2PiKtKBMiIugyihZtu47HfrmAmGrmZ6
        /XSim7+67r/i9CoMKLAsaqwrMTYQ2Zf9PP5Um9i13yMmyboelTEAUS6pE9eaQyMm
        8Ehgo8uAYCMlBKsIznPgHKGAzL9NdO01jLuCGgr4IlD2Yoc2WbKgFdPdJcorshed
        /q7/OKCy/sx8vzRuzKYou7yZ02lD3/WwRVuzC8I8HZZIeKL+PzEiarCE8mPqCRt2
        nQIDAQAB
        -----END PUBLIC KEY-----
    volumes:
      - ./app:/app/app
      - ./cli:/app/cli
      - ./dags:/app/dags
      - ./migrations:/app/migrations
    command: >
      sh -c " uv run alembic upgrade head && uv run python scripts/init_db.py && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 "
    depends_on:
      postgres:
        condition: service_healthy

  openbao:
    image: openbao/openbao:latest
    profiles:
      - core
    ports:
      - "8200:8200"
    environment:
      - BAO_DEV_ROOT_TOKEN_ID=root
      - BAO_DEV_LISTEN_ADDRESS=0.0.0.0:8200

  openbao-init:
    image: curlimages/curl:latest
    profiles:
      - core
    depends_on:
      - openbao
    entrypoint: |
      sh -c "
      echo 'Waiting for OpenBao...';
      until curl -s http://openbao:8200/v1/sys/health | grep -q '\"initialized\":true'; do
        sleep 1;
      done;
      curl --header 'X-Vault-Token: root' --request POST --data '{\"data\": {\"driver\": \"postgresql+asyncpg\", \"user\": \"airflow\", \"password\": \"airflow\", \"host\": \"postgres\", \"port\": 5432, \"database\": \"platform_db\"}}' http://openbao:8200/v1/secret/data/postgres
      curl --header 'X-Vault-Token: root' --request POST --data '{\"data\": {\"driver\": \"mongodb\", \"username\": \"admin\", \"password\": \"password\", \"host\": \"mongodb\", \"port\": 27017, \"database\": \"test_db\", \"auth_source\": \"admin\", \"uri\": \"mongodb://admin:password@mongodb:27017/test_db?authSource=admin\"}}' http://openbao:8200/v1/secret/data/mongo
      curl --header 'X-Vault-Token: root' --request POST --data '{\"data\": {\"driver\": \"postgresql+asyncpg\", \"user\": \"airflow\", \"password\": \"airflow\", \"host\": \"postgres-perf\", \"port\": 5432, \"database\": \"perf_db\"}}' http://openbao:8200/v1/secret/data/pg_perf
      curl --header 'X-Vault-Token: root' --request POST --data '{\"data\": {\"token\": \"e2e-test-token\"}}' http://openbao:8200/v1/secret/data/mock-store
      "

  e2e-tests:
    build:
      context: .
      dockerfile: Dockerfile.api
    profiles:
      - e2e-runner
    depends_on:
      platform-api:
        condition: service_started
      postgres:
        condition: service_healthy
      openbao-init:
        condition: service_completed_successfully
    environment:
      - API_URL=http://platform-api:8000
      - AIRFLOW_URL=http://airflow-webserver:8080
      - MOCK_API_HOST=mock-api
      - PLATFORM_DATABASE_URL=postgresql+asyncpg://airflow:airflow@postgres:5432/platform_db
      - PLATFORM_VAULT_URL=http://openbao:8200
      - PLATFORM_VAULT_TOKEN=root
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      - ./migrations:/app/migrations
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "
      echo 'Installing Docker CLI...';
      apt-get update && apt-get install -y docker.io &&
      echo 'Waiting for platform-api to be ready...';
      until curl -s http://platform-api:8000/docs > /dev/null; do
        sleep 2;
      done;
      echo 'Installing dev dependencies...';
      uv sync --all-extras;
      echo 'Running E2E tests...';
      uv run pytest tests/e2e/ -v
      "

  mongodb:
    image: mongo:6.0
    profiles:
      - e2e-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - ./scripts/e2e_seeds/mongo_init_schema.js:/docker-entrypoint-initdb.d/mongo_init_schema.js

  postgres-perf:
    image: postgres:15
    profiles:
      - e2e-pg-perf
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: perf_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    volumes:
      - ./scripts/e2e_seeds/postgres_perf_schema.sql:/docker-entrypoint-initdb.d/postgres_perf_schema.sql

  mock-api:
    build:
      context: .
      dockerfile: services/mock_store_api/Dockerfile
    profiles:
      - mock-api
      - e2e-api
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgresql+asyncpg://airflow:airflow@postgres:5432/platform_db
      PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-db-volume:
